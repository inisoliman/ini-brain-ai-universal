<svg xmlns="http://www.w3.org/2000/svg" width="920" height="620" viewBox="0 0 920 620" role="img" aria-labelledby="title desc">
  <title id="title">INI Brain يصل المشروع بوكلاء الذكاء الاصطناعي</title>
  <desc id="desc">رسم يوضح مجلد المشروع في الوسط واتصاله بكوديكس وكلود وكلين وفجوال ستوديو كود</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#131a2b"/><stop offset="1" stop-color="#27385c"/></linearGradient>
    <linearGradient id="brain" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#6d5dfc"/><stop offset="1" stop-color="#20b8c8"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-opacity=".24"/></filter>
  </defs>
  <rect width="920" height="620" rx="34" fill="url(#bg)"/>
  <g fill="none" stroke="#6ea7d8" stroke-width="3" stroke-dasharray="8 9" opacity=".7">
