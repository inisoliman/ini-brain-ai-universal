    <g><rect x="80" y="80" width="220" height="120" rx="24" fill="#eef1ff"/><circle cx="190" cy="125" r="23" fill="#5b4cf0"/><text x="190" y="134" fill="#fff">C</text><text x="190" y="174" fill="#242d45">Codex Windows</text></g>
    <g><rect x="620" y="80" width="220" height="120" rx="24" fill="#fff2e9"/><circle cx="730" cy="125" r="23" fill="#d97706"/><text x="730" y="134" fill="#fff">A</text><text x="730" y="174" fill="#242d45">Claude</text></g>
