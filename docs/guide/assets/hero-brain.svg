  <g font-family="Segoe UI,Arial" font-size="16" fill="#a9c2df" text-anchor="middle"><text x="460" y="56">ذاكرة واحدة • سياق مركز • مهارات عند الطلب</text><text x="460" y="584">لا ترسل مشروعك كاملًا إلى كل وكيل</text></g>
