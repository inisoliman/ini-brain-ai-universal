name: Sync Upstream Vault

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Refresh curated snapshots
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/sync-upstream-vault.cjs

      - name: Verify vault checksums
        run: node scripts/upstream-vault-smoke.cjs

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/sync-upstream-vault
          commit-message: 'chore: sync upstream vault snapshots'
          title: 'chore: sync upstream vault snapshots'
          body: |
            Automated daily refresh for curated upstream snapshots.

            Full upstream repositories are archived separately in the persistent upstream-archives release.
          labels: upstream-vault
