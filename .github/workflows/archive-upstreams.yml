name: Archive Upstreams

on:
  workflow_dispatch:
  schedule:
    - cron: '47 3 * * *'

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Create git bundle archives
        run: node scripts/archive-upstreams.cjs

      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: upstream-git-bundles
          path: upstream-archives/
          if-no-files-found: error

      - name: Publish permanent release backup
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view upstream-archives > /dev/null 2>&1 || gh release create upstream-archives --target "$GITHUB_SHA" --title "Upstream repository archives" --notes "Automated retained backup of approved upstream repositories."
          gh release upload upstream-archives upstream-archives/* --clobber
